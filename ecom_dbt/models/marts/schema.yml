version: 2

models:
  - name: fact_orders
    description: "One row per order. Core fact table."
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: total_price
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null

  - name: dim_product
    description: "One row per product with aggregated stats"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_user
    description: "One row per user with behaviour stats"
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "One row per date"
    columns:
      - name: date
        tests:
          - unique
          - not_null